<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Attendance Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: rgba(255,255,255,0.15);
            padding: 25px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
        }

        select, input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: white;
            color: #764ba2;
            font-weight: bold;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
        }

        #tutorialOption {
            display: none;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>📊 Attendance Dashboard</h2>

    <select id="subject" onchange="checkTutorial()">
        <option value="">Select Subject</option>
        <option value="CO">CO</option>
        <option value="Maths">Maths</option>
        <option value="Stats">Stats</option>
        <option value="VAC">VAC</option>
        <option value="Graphics">Graphics</option>
        <option value="MOS">MOS</option>
    </select>

    <div id="tutorialOption">
        <select id="tutorial">
            <option value="no">Exclude Tutorial</option>
            <option value="yes">Include Tutorial</option>
        </select>
    </div>

    <input type="number" id="leaves" placeholder="Total Leaves Taken">

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>
</div>

<script>

function checkTutorial() {
    let subject = document.getElementById("subject").value;
    document.getElementById("tutorialOption").style.display =
        (subject === "Maths" || subject === "Stats") ? "block" : "none";
}

function calculate() {

    let subject = document.getElementById("subject").value;
    let leaves = parseInt(document.getElementById("leaves").value);
    let tutorial = document.getElementById("tutorial").value;

    if (!subject || isNaN(leaves) || leaves < 0) {
        document.getElementById("result").innerHTML = "⚠ Enter valid details!";
        return;
    }

    let totalClasses = 40; // temporary test value

    let attended = totalClasses - leaves;
    if (attended < 0) attended = 0;

    let percentage = ((attended / totalClasses) * 100).toFixed(2);

    document.getElementById("result").innerHTML =
        `Attendance: ${percentage}%`;
}

</script>

</body>
</html>
